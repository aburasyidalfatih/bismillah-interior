<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0d151c" />
    <title>Admin Leads | Bismillah Interior</title>
    <link rel="stylesheet" href="admin.css?v=20260710-sqlite" />
  </head>
  <body>
    <main class="admin-shell">
      <section class="setup-view" data-login-view>
        <div class="setup-card">
          <a class="setup-brand" href="/" aria-label="Kembali ke Bismillah Interior">
            <span>BI</span>
            <strong>Bismillah Interior</strong>
          </a>
          <p class="eyebrow">Area terbatas</p>
          <h1>Dashboard Admin</h1>
          <p class="setup-copy">Masuk untuk melihat dan menindaklanjuti data konsultasi pelanggan.</p>

          <form class="setup-form" data-login-form>
            <label>
              Username
              <input type="text" name="username" autocomplete="username" placeholder="Username admin" required />
            </label>
            <label>
              Password
              <input type="password" name="password" autocomplete="current-password" placeholder="Password admin" required />
            </label>
            <button class="primary-action" type="submit">
              <i data-lucide="log-in"></i>
              <span>Masuk Dashboard</span>
            </button>
            <p class="login-status" data-login-status role="status"></p>
          </form>
        </div>
      </section>

      <section class="dashboard-view" data-dashboard-view hidden>
        <header class="admin-header">
          <div>
            <a class="admin-back-link" href="/"><i data-lucide="arrow-left"></i> Website</a>
            <p class="eyebrow">Admin</p>
            <h1>Leads Bismillah Interior</h1>
          </div>
          <div class="header-actions">
            <button type="button" class="ghost-action" data-refresh title="Muat ulang data">
              <i data-lucide="refresh-cw"></i><span>Refresh</span>
            </button>
            <button type="button" class="ghost-action" data-export title="Unduh data CSV">
              <i data-lucide="download"></i><span>Export CSV</span>
            </button>
            <button type="button" class="danger-action" data-logout title="Keluar dashboard">
              <i data-lucide="log-out"></i><span>Keluar</span>
            </button>
          </div>
        </header>

        <section class="status-line" data-status-line role="status">Memuat dashboard...</section>

        <section class="stat-grid" aria-label="Ringkasan leads">
          <article>
            <span>Total leads</span>
            <strong data-stat-total>0</strong>
          </article>
          <article>
            <span>Hari ini</span>
            <strong data-stat-today>0</strong>
          </article>
          <article>
            <span>7 hari</span>
            <strong data-stat-week>0</strong>
          </article>
          <article>
            <span>Belum dihubungi</span>
            <strong data-stat-new>0</strong>
          </article>
        </section>

        <section class="toolbar" aria-label="Filter leads">
          <label>
            Cari customer
            <input type="search" data-search placeholder="Nama, nomor, kota, atau produk..." />
          </label>
          <label>
            Status follow-up
            <select data-status-filter>
              <option value="all">Semua status</option>
              <option value="new">Belum dihubungi</option>
              <option value="contacted">Sudah dihubungi</option>
              <option value="survey">Survei</option>
              <option value="design">Desain</option>
              <option value="won">Deal</option>
              <option value="lost">Tidak lanjut</option>
            </select>
          </label>
        </section>

        <section class="admin-layout">
          <div class="lead-list" data-lead-list aria-live="polite"></div>

          <aside class="lead-detail" data-lead-detail>
            <div class="empty-detail">
              <p>Pilih salah satu lead untuk melihat detail.</p>
            </div>
          </aside>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="admin.js?v=20260710-sqlite"></script>
  </body>
</html>
