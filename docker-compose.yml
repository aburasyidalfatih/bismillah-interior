services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      APP_ENV: production
      DATABASE_PATH: /app/data/bismillah.db
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY wajib diisi}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD wajib diisi}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-bismillahinterior.web.id}
    volumes:
      - bismillah_data:/app/data

volumes:
  bismillah_data:
